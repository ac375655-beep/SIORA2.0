<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIORA 2.0</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-custom { background-color: #161b22; border-bottom: 2px solid #00d4ff; }
        .nav-link { color: #00d4ff !important; font-weight: bold; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; }
        .form-control, .form-select { background-color: #0d1117; color: #ffffff !important; border: 1px solid #30363d; }
        .form-control:focus, .form-select:focus { background-color: #0d1117; border-color: #00d4ff; box-shadow: 0 0 5px rgba(0, 212, 255, 0.5); }
        .btn-neon { background-color: transparent; color: #00d4ff; border: 1px solid #00d4ff; transition: all 0.3s; }
        .btn-neon:hover { background-color: #00d4ff; color: #000; }
        table { color: #e6edf3 !important; }
        thead th { color: #00d4ff !important; }
        .text-light { color: #e6edf3 !important; }
        .text-secondary { color: #8b949e !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand text-info fw-bold" href="/">✈ SIORA 2.0</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="background-color: #00d4ff; border-radius: 3px;"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/aeropuertos">Gestión de Red</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rutas">Simulador Óptimo</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
